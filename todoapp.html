<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App — Jan Kowalski</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-soft: #f7f7f5;
      --text: #1a1a18;
      --muted: #6b6b67;
      --border: rgba(0,0,0,0.1);
      --accent: #185FA5;
      --accent-light: #E6F1FB;
      --accent-text: #0C447C;
      --green: #1D9E75;
      --red: #E24B4A;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg-soft);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      width: 100%;
      max-width: 520px;
      margin-bottom: 2rem;
    }

    header a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }
    header a:hover { color: var(--accent); }

    h1 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-top: 0.5rem;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      width: 100%;
      max-width: 520px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 9px 14px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
      background: var(--bg-soft);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    button.add-btn {
      padding: 9px 18px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    button.add-btn:hover { opacity: 0.8; }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 1rem;
    }
    .filter-btn {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 99px;
      border: 0.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .todo-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-soft);
      transition: opacity 0.2s;
    }
    .todo-item.done { opacity: 0.5; }

    .check-btn {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      padding: 0;
    }
    .check-btn:hover { border-color: var(--green); }
    .todo-item.done .check-btn {
      background: var(--green);
      border-color: var(--green);
    }
    .check-btn svg { display: none; }
    .todo-item.done .check-btn svg { display: block; }

    .todo-text {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      transition: all 0.15s;
    }
    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .delete-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .delete-btn:hover { color: var(--red); }

    .empty {
      text-align: center;
      padding: 2rem 0;
      font-size: 14px;
      color: var(--muted);
    }

    .stats {
      margin-top: 1rem;
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }

    footer {
      margin-top: 2rem;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141413;
        --bg-soft: #1e1e1c;
        --text: #f0efe8;
        --muted: #9a9994;
        --border: rgba(255,255,255,0.1);
        --accent-light: #0C3A6A;
        --accent-text: #85B7EB;
      }
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html">← Back to portfolio</a>
    <h1>To-Do App</h1>
    <p class="subtitle">Built with HTML, CSS & JavaScript · by Jan Kowalski</p>
  </header>

  <div class="card">
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="Add a new task..." />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>

    <ul class="todo-list" id="todo-list"></ul>
    <div class="empty" id="empty-state" style="display:none">No tasks here yet!</div>
    <p class="stats" id="stats"></p>
  </div>

  <footer>
    Part of <a href="index.html">Jan Kowalski's portfolio</a>
  </footer>

  <script>
    let todos = JSON.parse(localStorage.getItem('jk-todos') || '[]');
    let filter = 'all';

    const input = document.getElementById('todo-input');
    const list = document.getElementById('todo-list');
    const empty = document.getElementById('empty-state');
    const stats = document.getElementById('stats');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    function save() {
      localStorage.setItem('jk-todos', JSON.stringify(todos));
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggleTodo(id) {
      todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      list.innerHTML = '';

      if (filtered.length === 0) {
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        filtered.forEach(todo => {
          const li = document.createElement('li');
          li.className = 'todo-item' + (todo.done ? ' done' : '');
          li.innerHTML = `
            <button class="check-btn" onclick="toggleTodo(${todo.id})" aria-label="Toggle done">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                <path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <span class="todo-text">${escapeHtml(todo.text)}</span>
            <button class="delete-btn" onclick="deleteTodo(${todo.id})" aria-label="Delete task">✕</button>
          `;
          list.appendChild(li);
        });
      }

      const done = todos.filter(t => t.done).length;
      stats.textContent = todos.length > 0 ? `${done} of ${todos.length} completed` : '';
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    render();
  </script>

</body>
</html>
